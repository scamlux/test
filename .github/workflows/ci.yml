name: CI/CD - Build & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  DOCKER_USERNAME: scamlux3221

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [
            { name: api-gateway, path: ./services/api-gateway },
            { name: order-service, path: ./services/order-service },
            { name: inventory-service, path: ./services/inventory-service },
            { name: payment-service, path: ./services/payment-service },
            { name: query-service, path: ./services/query-service },
            { name: web, path: ./web },
          ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: REACT_APP_API_URL=http://api-gateway:8000

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Update Helm values
        run: |
          sed -i "s/tag:.*/tag: ${{ github.sha }}/" helm/values.yaml
          cat helm/values.yaml | grep -A 2 "api-gateway"

      - name: Push changes to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add helm/values.yaml
          git commit -m "chore: update image tags" || true
          git push

  notify:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## ✅ CI/CD Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Images: scamlux3221/*:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Images pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "⏳ Waiting for ArgoCD sync..." >> $GITHUB_STEP_SUMMARY

      # 6. Autodeploy (simulation)
      - name: Auto deploy (pull & up)
        env:
          TAG: ${{ github.sha }}
        run: |
          echo "Deployment version: $TAG"
